AWSTemplateFormatVersion: '2010-09-09'
Description: Remittances frontend — S3 (private) + CloudFront (HTTPS + security headers)

Parameters:
  ProjectName:
    Type: String
    Default: remittances
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

Resources:

  # ── S3 ────────────────────────────────────────────────────────────

  StaticBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-${Environment}-frontend'
      # Bloqueo total de acceso público — solo CloudFront OAC puede leer
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  StaticBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StaticBucket
      PolicyDocument:
        Statement:
          # Solo CloudFront (via OAC) puede hacer GetObject
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${StaticBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}'
          # Deniega cualquier petición sin TLS (cifrado en tránsito)
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt StaticBucket.Arn
              - !Sub '${StaticBucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': false

  # ── CloudFront ────────────────────────────────────────────────────

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${ProjectName}-${Environment}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # Cabeceras de seguridad aplicadas a todas las respuestas
  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub '${ProjectName}-${Environment}-security-headers'
        SecurityHeadersConfig:
          # Fuerza HTTPS durante 2 años, incluye subdominios
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 63072000
            IncludeSubdomains: true
            Preload: true
            Override: true
          # Evita que el navegador adivine el MIME type
          ContentTypeOptions:
            Override: true
          # Impide que la app se cargue dentro de un iframe (clickjacking)
          FrameOptions:
            FrameOption: DENY
            Override: true
          # No filtra información de origen en cabecera Referer
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          # XSS protection legacy (navegadores viejos)
          XSSProtection:
            ModeBlock: true
            Protection: true
            Override: true

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
      DistributionConfig:
        Enabled: true
        Comment: !Sub '${ProjectName}-${Environment} frontend'
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100  # Solo US + Europa (más barato)
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt StaticBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
        CacheBehaviors:
          # Assets de Next.js llevan hash de contenido → caché agresiva (1 año)
          - PathPattern: /_next/static/*
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
            ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
            Compress: true
        # HTML: sin caché para que los deploys propaguen inmediatamente
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
          Compress: true
        # SPA fallback: rutas inexistentes devuelven index.html con 200
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

Outputs:
  BucketName:
    Value: !Ref StaticBucket
    Description: S3 bucket name
  DistributionId:
    Value: !Ref Distribution
    Description: CloudFront distribution ID (necesario para invalidar caché)
  DistributionDomain:
    Value: !GetAtt Distribution.DomainName
    Description: URL HTTPS de CloudFront
